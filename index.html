<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pronounce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --bg: #f4ead0;
    --ink: #0e3a6b;
    --accent: #d97824;
    --pop: #c64f3a;
    --sea: #2a8a8a;
    --muted: #6b7d94;
    --card: #fffdf6;
    --shadow: 0 24px 50px rgba(14, 58, 107, 0.18);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Lora", ui-serif, Georgia, serif;
    background:
      radial-gradient(1100px 550px at 85% -10%, #f4d35e 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 110%, #2a8a8a 0%, transparent 50%),
      radial-gradient(700px 400px at 110% 90%, #c64f3a 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 20px;
    gap: 16px;
  }
  header { text-align: center; }
  h1 {
    margin: 0;
    font-size: clamp(38px, 4.5vw, 72px);
    letter-spacing: 0.01em;
    font-weight: 600;
  }
  .tagline {
    color: var(--muted);
    font-style: italic;
    margin-top: 2px;
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .sub {
    color: var(--muted);
    margin-top: 8px;
    font-size: 13px;
  }
  .nav { margin-top: 8px; font-size: 13px; }
  .nav a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
    letter-spacing: 0.04em;
  }
  .nav a:hover { color: var(--ink); border-color: var(--ink); }
  .progress {
    color: var(--muted);
    font-variant: small-caps;
    letter-spacing: 0.1em;
    font-size: clamp(13px, 1.1vw, 17px);
  }
  .scene {
    width: min(900px, 92vw);
    perspective: 1400px;
  }
  .card {
    position: relative;
    width: 100%;
    aspect-ratio: 5 / 3;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.2,.8,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }
  .face.back { transform: rotateY(180deg); }
  .flag {
    position: absolute;
    top: 14px;
    right: 18px;
    font-size: clamp(26px, 2.4vw, 40px);
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(14,58,107,0.18));
  }
  .country {
    position: absolute;
    top: 22px;
    left: 18px;
    font-size: clamp(11px, 0.95vw, 15px);
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .place {
    font-size: clamp(34px, 5.5vw, 84px);
    margin: 0;
    line-height: 1.1;
  }
  .hint {
    color: var(--muted);
    margin-top: 12px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .phonetic {
    font-size: clamp(22px, 3.2vw, 50px);
    color: var(--muted);
    margin: 18px 0 0;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.02em;
  }
  .stress {
    color: var(--accent);
    font-weight: 600;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 1px;
  }
  .ipa {
    color: var(--muted);
    font-size: clamp(14px, 1.4vw, 22px);
    margin-bottom: 14px;
  }
  .tips {
    font-size: clamp(16px, 1.8vw, 26px);
    color: var(--ink);
    line-height: 1.5;
    margin: 6px 0 0;
    padding-left: 1.4em;
    text-align: left;
    max-width: 90%;
  }
  .tips li { margin: 6px 0; }
  .tips li::marker { color: var(--accent); }

  #mini-map {
    width: min(1100px, 94vw);
    height: clamp(220px, 42vh, 560px);
    border-radius: 18px;
    box-shadow: 0 18px 36px rgba(14,58,107,0.18);
    overflow: hidden;
    background: #cfe3e0;
  }
  .leaflet-container { font-family: inherit; }
  .pin {
    background: var(--accent);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 3px solid #fffdf6;
    box-shadow: 0 4px 10px rgba(217,120,36,0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font: inherit;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    padding: 12px 22px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.1s ease, background 0.2s ease;
  }
  button.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  button.accent {
    background: var(--accent);
    color: #fffdf6;
  }
  button.accent:hover { background: var(--pop); }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  footer {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  kbd {
    background: #fffdf6;
    border: 1px solid #d8c8b1;
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<header>
  <h1>Pronounce</h1>
  <nav class="nav"><a href="all.html">all places</a> · <a href="manage.html">add or delete</a></nav>
</header>

<div class="progress" id="progress">1 / 1</div>

<div class="scene">
  <div class="card" id="card">
    <div class="face front">
      <span class="country" id="country">—</span>
      <span class="flag" id="flag">🏳️</span>
      <h2 class="place" id="place">—</h2>
      <p class="phonetic" id="phonetic">—</p>
    </div>
    <div class="face back">
      <span class="country" id="country2">—</span>
      <span class="flag" id="flag2">🏳️</span>
      <div class="ipa" id="ipa"></div>
      <ul class="tips" id="tips"></ul>
    </div>
  </div>
</div>

<div id="mini-map"></div>

<div class="controls">
  <button class="ghost" id="prev">← Prev</button>
  <button class="accent" id="speak">🔊 Hear it</button>
  <button id="next">Next →</button>
  <button class="ghost" id="shuffle">Shuffle</button>
</div>

<footer>Italian, English, German, &amp; Slovenian voices via your browser.</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="places.js"></script>
<script>
let order = [];
let idx = 0;
let flipped = false;

const $ = id => document.getElementById(id);
const card = $("card");

const map = L.map("mini-map", {
  zoomControl: true,
  attributionControl: false,
  scrollWheelZoom: true,
  dragging: true,
  doubleClickZoom: true,
}).setView([42, 13], 4);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
}).addTo(map);
const pinIcon = L.divIcon({ className: "", html: '<div class="pin"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
const marker = L.marker([42, 13], { icon: pinIcon }).addTo(map);

function styleStress(phonetic) {
  return phonetic
    .split(/(\s|-)/)
    .map(part => /^[A-Z]{2,}$/.test(part) ? `<span class="stress">${part}</span>` : part)
    .join("");
}

function render() {
  const p = PLACES[order[idx]];
  $("place").textContent = p.name;
  $("phonetic").innerHTML = styleStress(p.phonetic);
  $("ipa").textContent = p.ipa || "";
  const tipsEl = $("tips");
  tipsEl.innerHTML = "";
  (p.tips || []).forEach(t => {
    const li = document.createElement("li");
    li.textContent = t;
    tipsEl.appendChild(li);
  });
  $("flag").textContent = COUNTRY_FLAG[p.country] || "🏳️";
  $("flag2").textContent = COUNTRY_FLAG[p.country] || "🏳️";
  $("country").textContent = COUNTRY_NAME[p.country] || "";
  $("country2").textContent = COUNTRY_NAME[p.country] || "";
  $("progress").textContent = `${idx + 1} / ${order.length}`;
  setFlipped(false);
  marker.setLatLng([p.lat, p.lng]);
  map.flyTo([p.lat, p.lng], 11, { duration: 1.6 });
}

function setFlipped(v) {
  flipped = v;
  card.classList.toggle("flipped", flipped);
}

function next() { idx = (idx + 1) % order.length; render(); }
function prev() { idx = (idx - 1 + order.length) % order.length; render(); }
function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  idx = 0;
  render();
}
function speak() { speakPlace(PLACES[order[idx]]); }

card.addEventListener("click", () => setFlipped(!flipped));
$("next").addEventListener("click", next);
$("prev").addEventListener("click", prev);
$("speak").addEventListener("click", e => { e.stopPropagation(); speak(); });
$("shuffle").addEventListener("click", shuffle);

document.addEventListener("keydown", e => {
  const tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA") return;
  if (e.key === " ") { e.preventDefault(); speak(); }
  else if (e.key === "ArrowUp" || e.key === "Enter") { e.preventDefault(); setFlipped(!flipped); }
  else if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
});

placesReady.then(() => {
  order = PLACES.map((_, i) => i);
  render();
  setTimeout(() => map.invalidateSize(), 100);
});
</script>
</body>
</html>
