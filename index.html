<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pronounce Sicily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ead0;
    --ink: #0e3a6b;
    --accent: #d97824;
    --pop: #c64f3a;
    --sea: #2a8a8a;
    --muted: #6b7d94;
    --card: #fffdf6;
    --shadow: 0 24px 50px rgba(14, 58, 107, 0.18);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Fraunces", ui-serif, Georgia, serif;
    font-optical-sizing: auto;
    background:
      radial-gradient(1100px 550px at 85% -10%, #f4d35e 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 110%, #2a8a8a 0%, transparent 50%),
      radial-gradient(700px 400px at 110% 90%, #c64f3a 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 60px;
    min-height: 100%;
  }
  header { text-align: center; margin-bottom: 18px; }
  h1 {
    margin: 0;
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: 0.02em;
  }
  .sub {
    color: var(--muted);
    font-style: italic;
    margin-top: 6px;
    font-size: 14px;
  }
  .progress {
    color: var(--muted);
    font-variant: small-caps;
    letter-spacing: 0.1em;
    margin: 14px 0 18px;
    font-size: 13px;
  }
  .scene {
    width: min(540px, 92vw);
    perspective: 1400px;
  }
  .card {
    position: relative;
    width: 100%;
    aspect-ratio: 5 / 3;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.2,.8,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }
  .face.back { transform: rotateY(180deg); }
  .place {
    font-size: clamp(30px, 6vw, 52px);
    margin: 0;
    line-height: 1.1;
  }
  .hint {
    color: var(--muted);
    margin-top: 12px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .phonetic {
    font-size: clamp(22px, 4.4vw, 36px);
    color: var(--accent);
    margin: 0 0 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .ipa {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .note {
    font-size: 14px;
    color: var(--ink);
    max-width: 90%;
    line-height: 1.4;
  }
  .forvo {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px dotted var(--muted);
    letter-spacing: 0.04em;
  }
  .forvo:hover { color: var(--accent); border-color: var(--accent); }
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font: inherit;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    padding: 12px 22px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.1s ease, background 0.2s ease;
  }
  button.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  button.accent {
    background: var(--accent);
    color: #fffdf6;
  }
  button.accent:hover { background: var(--pop); }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  footer {
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  .nav { margin-top: 10px; font-size: 13px; }
  .nav a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
    letter-spacing: 0.04em;
  }
  .nav a:hover { color: var(--ink); border-color: var(--ink); }
  kbd {
    background: #fffaf2;
    border: 1px solid #d8c8b1;
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<header>
  <h1>Pronounce Sicily</h1>
  <div class="sub">press <kbd>Space</kbd> to hear it · click or <kbd>Enter</kbd> to flip · <kbd>→</kbd> next · <kbd>←</kbd> previous</div>
  <nav class="nav"><a href="all.html">see all places →</a></nav>
</header>

<div class="progress" id="progress">1 / 8</div>

<div class="scene">
  <div class="card" id="card">
    <div class="face front">
      <h2 class="place" id="place">—</h2>
      <div class="hint">tap to reveal</div>
    </div>
    <div class="face back">
      <p class="phonetic" id="phonetic">—</p>
      <div class="ipa" id="ipa"></div>
      <div class="note" id="note"></div>
      <a class="forvo" id="forvo" target="_blank" rel="noopener">hear a local on Forvo →</a>
    </div>
  </div>
</div>

<div class="controls">
  <button class="ghost" id="prev">← Prev</button>
  <button class="accent" id="speak">🔊 Hear it</button>
  <button id="next">Next →</button>
  <button class="ghost" id="shuffle">Shuffle</button>
</div>

<footer>Italian pronunciation. Audio uses your browser's Italian voice when available.</footer>

<script src="places.js"></script>
<script>
let order = PLACES.map((_, i) => i);
let idx = 0;
let flipped = false;

const $ = id => document.getElementById(id);
const card = $("card");

function render() {
  const p = PLACES[order[idx]];
  $("place").textContent = p.name;
  $("phonetic").textContent = p.phonetic;
  $("ipa").textContent = p.ipa;
  $("note").textContent = p.note;
  $("forvo").href = `https://forvo.com/word/${encodeURIComponent(p.name.toLowerCase().replace(/ /g, "_"))}/#it`;
  $("progress").textContent = `${idx + 1} / ${order.length}`;
  setFlipped(false);
}

function setFlipped(v) {
  flipped = v;
  card.classList.toggle("flipped", flipped);
}

function next() {
  idx = (idx + 1) % order.length;
  render();
}
function prev() {
  idx = (idx - 1 + order.length) % order.length;
  render();
}
function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  idx = 0;
  render();
}

function speak() {
  speakPlace(PLACES[order[idx]]);
}

card.addEventListener("click", () => setFlipped(!flipped));
$("next").addEventListener("click", next);
$("prev").addEventListener("click", prev);
$("speak").addEventListener("click", e => { e.stopPropagation(); speak(); });
$("shuffle").addEventListener("click", shuffle);

document.addEventListener("keydown", e => {
  const tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA") return;
  if (e.key === " ") { e.preventDefault(); speak(); }
  else if (e.key === "Enter") { e.preventDefault(); setFlipped(!flipped); }
  else if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
});

render();
</script>
</body>
</html>
