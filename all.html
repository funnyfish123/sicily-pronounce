<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>All places · Pronounce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --bg: #f4ead0;
    --ink: #0e3a6b;
    --accent: #d97824;
    --pop: #c64f3a;
    --sea: #2a8a8a;
    --muted: #6b7d94;
    --card: #fffdf6;
    --shadow: 0 10px 22px rgba(14, 58, 107, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: "Fraunces", ui-serif, Georgia, serif;
    font-optical-sizing: auto;
    background:
      radial-gradient(1100px 550px at 85% -10%, #f4d35e 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 110%, #2a8a8a 0%, transparent 50%),
      radial-gradient(700px 400px at 110% 90%, #c64f3a 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; margin-bottom: 18px; }
  h1 {
    margin: 0;
    font-size: clamp(34px, 5vw, 48px);
    letter-spacing: 0.01em;
    font-weight: 600;
    font-style: italic;
  }
  .tagline {
    color: var(--muted);
    font-style: italic;
    font-size: 14px;
    margin-top: 2px;
  }
  .nav { margin-top: 8px; font-size: 13px; }
  .nav a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
    letter-spacing: 0.04em;
  }
  .nav a:hover { color: var(--ink); border-color: var(--ink); }

  #big-map {
    width: min(720px, 96vw);
    height: 320px;
    border-radius: 18px;
    box-shadow: 0 18px 36px rgba(14,58,107,0.18);
    overflow: hidden;
    margin-bottom: 22px;
    background: #cfe3e0;
  }
  .leaflet-container { font-family: inherit; }
  .pin {
    background: var(--accent);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #fffdf6;
    box-shadow: 0 3px 6px rgba(217,120,36,0.45);
    transition: transform 0.2s ease;
  }
  .pin.active {
    background: var(--pop);
    transform: scale(1.5);
    box-shadow: 0 4px 10px rgba(198,79,58,0.6);
  }

  .list {
    width: min(720px, 96vw);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.2s ease;
  }
  .row:hover { transform: translateY(-1px); box-shadow: 0 14px 26px rgba(14,58,107,0.16); }
  .row.active { outline: 2px solid var(--accent); }
  .flag {
    font-size: 28px;
    line-height: 1;
  }
  .name {
    font-size: clamp(20px, 3.2vw, 26px);
    margin: 0 0 2px;
    line-height: 1.1;
  }
  .phon {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--accent);
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: 0.02em;
  }
  .play {
    font: inherit;
    font-size: 20px;
    background: var(--accent);
    color: #fffdf6;
    border: none;
    border-radius: 999px;
    width: 48px;
    height: 48px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 14px rgba(217, 120, 36, 0.35);
    transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
  }
  .play:hover { transform: translateY(-1px); background: var(--pop); }
  .play:active { transform: translateY(0); }
  .play.playing { background: var(--sea); }
  footer {
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>Pronounce</h1>
  <div class="tagline">all places · click a row to fly there</div>
  <nav class="nav"><a href="index.html">← back to flashcards</a></nav>
</header>

<div id="big-map"></div>

<div class="list" id="list"></div>

<footer>Italian, English, German, &amp; Slovenian voices via your browser.</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="places.js"></script>
<script>
  const map = L.map("big-map", { zoomControl: true, attributionControl: false }).setView([44, 12], 5);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 18 }).addTo(map);

  const list = document.getElementById("list");
  const markers = [];
  const rows = [];

  PLACES.forEach((p, i) => {
    const pinEl = document.createElement("div");
    pinEl.className = "pin";
    const icon = L.divIcon({ className: "", html: pinEl.outerHTML, iconSize: [14, 14], iconAnchor: [7, 7] });
    const m = L.marker([p.lat, p.lng], { icon, title: p.name }).addTo(map);
    m.on("click", () => focus(i));
    markers.push(m);

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <span class="flag">${COUNTRY_FLAG[p.country] || "🏳️"}</span>
      <div>
        <h2 class="name"></h2>
        <div class="phon"></div>
      </div>
      <button class="play" aria-label="Play pronunciation of ${p.name}">▶</button>
    `;
    row.querySelector(".name").textContent = p.name;
    row.querySelector(".phon").textContent = p.phonetic;
    const btn = row.querySelector(".play");
    btn.addEventListener("click", e => {
      e.stopPropagation();
      document.querySelectorAll(".play.playing").forEach(b => b.classList.remove("playing"));
      btn.classList.add("playing");
      speakPlace(p);
      setTimeout(() => btn.classList.remove("playing"), 1800);
      focus(i);
    });
    row.addEventListener("click", () => { focus(i); });
    list.appendChild(row);
    rows.push(row);
  });

  function focus(i) {
    rows.forEach(r => r.classList.remove("active"));
    rows[i].classList.add("active");
    document.querySelectorAll(".leaflet-marker-icon .pin.active").forEach(el => el.classList.remove("active"));
    const el = markers[i].getElement();
    if (el) {
      const pin = el.querySelector(".pin");
      if (pin) pin.classList.add("active");
    }
    map.flyTo([PLACES[i].lat, PLACES[i].lng], 11, { duration: 1.6 });
    rows[i].scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // Fit to all markers on initial load.
  const bounds = L.latLngBounds(PLACES.map(p => [p.lat, p.lng]));
  map.fitBounds(bounds, { padding: [30, 30] });
</script>
</body>
</html>
