<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>All places · Pronounce Sicily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ead0;
    --ink: #0e3a6b;
    --accent: #d97824;
    --pop: #c64f3a;
    --sea: #2a8a8a;
    --muted: #6b7d94;
    --card: #fffdf6;
    --shadow: 0 10px 22px rgba(14, 58, 107, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: "Fraunces", ui-serif, Georgia, serif;
    font-optical-sizing: auto;
    background:
      radial-gradient(1100px 550px at 85% -10%, #f4d35e 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 110%, #2a8a8a 0%, transparent 50%),
      radial-gradient(700px 400px at 110% 90%, #c64f3a 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; margin-bottom: 22px; }
  h1 {
    margin: 0;
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: 0.02em;
  }
  .nav { margin-top: 8px; font-size: 13px; }
  .nav a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
    letter-spacing: 0.04em;
  }
  .nav a:hover { color: var(--ink); border-color: var(--ink); }

  .list {
    width: min(640px, 96vw);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
  }
  .name {
    font-size: clamp(22px, 3.6vw, 30px);
    margin: 0 0 4px;
    line-height: 1.1;
  }
  .phon {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--accent);
    font-size: clamp(14px, 2.2vw, 17px);
    letter-spacing: 0.02em;
  }
  .play {
    font: inherit;
    font-size: 22px;
    background: var(--accent);
    color: #fffdf6;
    border: none;
    border-radius: 999px;
    width: 52px;
    height: 52px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 14px rgba(217, 120, 36, 0.35);
    transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
  }
  .play:hover { transform: translateY(-1px); background: var(--pop); box-shadow: 0 8px 18px rgba(198, 79, 58, 0.4); }
  .play:active { transform: translateY(0); }
  .play.playing { background: var(--sea); box-shadow: 0 6px 14px rgba(42, 138, 138, 0.4); }
  footer {
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>All places</h1>
  <nav class="nav"><a href="index.html">← back to flashcards</a></nav>
</header>

<div class="list" id="list"></div>

<footer>Italian pronunciation. Audio uses your browser's Italian voice when available.</footer>

<script src="places.js"></script>
<script>
  const list = document.getElementById("list");
  PLACES.forEach(p => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div>
        <h2 class="name"></h2>
        <div class="phon"></div>
      </div>
      <button class="play" aria-label="Play pronunciation of ${p.name}">▶</button>
    `;
    row.querySelector(".name").textContent = p.name;
    row.querySelector(".phon").textContent = p.phonetic;
    const btn = row.querySelector(".play");
    btn.addEventListener("click", () => {
      document.querySelectorAll(".play.playing").forEach(b => b.classList.remove("playing"));
      btn.classList.add("playing");
      speakPlace(p);
      setTimeout(() => btn.classList.remove("playing"), 1800);
    });
    list.appendChild(row);
  });
</script>
</body>
</html>
