<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>All places · Pronounce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --bg: #f4ead0;
    --ink: #0e3a6b;
    --accent: #d97824;
    --pop: #c64f3a;
    --sea: #2a8a8a;
    --muted: #6b7d94;
    --card: #fffdf6;
    --shadow: 0 10px 22px rgba(14, 58, 107, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: "Lora", ui-serif, Georgia, serif;
    background:
      radial-gradient(1100px 550px at 85% -10%, #f4d35e 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 110%, #2a8a8a 0%, transparent 50%),
      radial-gradient(700px 400px at 110% 90%, #c64f3a 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; margin-bottom: 18px; }
  h1 {
    margin: 0;
    font-size: clamp(38px, 4.5vw, 64px);
    letter-spacing: 0.01em;
    font-weight: 600;
  }
  .tagline {
    color: var(--muted);
    font-style: italic;
    font-size: 14px;
    margin-top: 2px;
  }
  .nav { margin-top: 10px; font-size: 14px; }
  .nav a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
    letter-spacing: 0.04em;
    margin: 0 8px;
  }
  .nav a:hover { color: var(--ink); border-color: var(--ink); }

  .layout {
    width: min(1280px, 96vw);
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  #big-map {
    width: 100%;
    height: clamp(320px, 55vh, 720px);
    border-radius: 20px;
    box-shadow: 0 22px 44px rgba(14,58,107,0.2);
    overflow: hidden;
    background: #cfe3e0;
  }
  @media (min-width: 900px) {
    .layout {
      width: min(1400px, 96vw);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    #big-map {
      height: clamp(420px, 78vh, 820px);
      position: sticky;
      top: 20px;
    }
  }
  .leaflet-container { font-family: inherit; }
  .pin {
    background: var(--accent);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #fffdf6;
    box-shadow: 0 3px 6px rgba(217,120,36,0.45);
    transition: transform 0.2s ease;
  }
  .pin.active {
    background: var(--pop);
    transform: scale(1.5);
    box-shadow: 0 4px 10px rgba(198,79,58,0.6);
  }

  .list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.2s ease;
  }
  .row:hover { transform: translateY(-1px); box-shadow: 0 14px 26px rgba(14,58,107,0.16); }
  .row.active { outline: 2px solid var(--accent); }
  .flag {
    font-size: clamp(28px, 2.6vw, 40px);
    line-height: 1;
  }
  .name {
    font-size: clamp(22px, 2.4vw, 36px);
    margin: 0 0 4px;
    line-height: 1.1;
  }
  .phon {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--accent);
    font-size: clamp(14px, 1.4vw, 22px);
    letter-spacing: 0.02em;
  }
  .play {
    font: inherit;
    font-size: clamp(20px, 1.6vw, 26px);
    background: var(--accent);
    color: #fffdf6;
    border: none;
    border-radius: 999px;
    width: clamp(48px, 4.5vw, 64px);
    height: clamp(48px, 4.5vw, 64px);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 14px rgba(217, 120, 36, 0.35);
    transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
  }
  .play:hover { transform: translateY(-1px); background: var(--pop); }
  .play:active { transform: translateY(0); }
  .play.playing { background: var(--sea); }
  footer {
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>Pronounce</h1>
  <nav class="nav">
    <a href="index.html">flashcards</a>
    <a href="manage.html">add or delete</a>
  </nav>
</header>

<div class="layout">
  <div id="big-map"></div>
  <div class="list" id="list"></div>
</div>

<footer>Italian, English, German, &amp; Slovenian voices via your browser.</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="places.js"></script>
<script>
  const map = L.map("big-map", { zoomControl: true, attributionControl: false }).setView([44, 12], 5);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 18 }).addTo(map);

  const list = document.getElementById("list");
  const markers = [];
  const rows = [];

  placesReady.then(initAll);

  function initAll() {

  function play(i) {
    const p = PLACES[i];
    const btn = rows[i].querySelector(".play");
    document.querySelectorAll(".play.playing").forEach(b => b.classList.remove("playing"));
    btn.classList.add("playing");
    speakPlace(p);
    setTimeout(() => btn.classList.remove("playing"), 1800);
    focus(i);
  }

  PLACES.forEach((p, i) => {
    const pinEl = document.createElement("div");
    pinEl.className = "pin";
    const icon = L.divIcon({ className: "", html: pinEl.outerHTML, iconSize: [14, 14], iconAnchor: [7, 7] });
    const m = L.marker([p.lat, p.lng], { icon, title: p.name }).addTo(map);
    m.on("click", () => play(i));
    markers.push(m);

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <span class="flag">${flagFor(p.country)}</span>
      <div>
        <h2 class="name"></h2>
        <div class="phon"></div>
      </div>
      <button class="play" aria-label="Play pronunciation of ${p.name}">▶</button>
    `;
    row.querySelector(".name").textContent = p.name;
    row.querySelector(".phon").textContent = p.phonetic;
    const btn = row.querySelector(".play");
    btn.addEventListener("click", e => { e.stopPropagation(); play(i); });
    row.addEventListener("click", () => play(i));
    list.appendChild(row);
    rows.push(row);
  });

  function focus(i) {
    rows.forEach(r => r.classList.remove("active"));
    rows[i].classList.add("active");
    document.querySelectorAll(".leaflet-marker-icon .pin.active").forEach(el => el.classList.remove("active"));
    const el = markers[i].getElement();
    if (el) {
      const pin = el.querySelector(".pin");
      if (pin) pin.classList.add("active");
    }
    map.flyTo([PLACES[i].lat, PLACES[i].lng], 11, { duration: 1.6 });
  }

  // Fit to all markers on initial load.
  const bounds = L.latLngBounds(PLACES.map(p => [p.lat, p.lng]));
  map.fitBounds(bounds, { padding: [30, 30] });

  } // end initAll
</script>
</body>
</html>
